<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content=
"width=device-width, initial-scale=1.0">
	<title>Reading Time App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4" style="max-width: 600px; width: 100%;">
            
            <div class="mb-4 text-center">
            <h1>Time reading App</h1>
            <p class="text-muted">So far you've read 200 minutes and 200 pages!</p>
            </div>

            <div class="row">

                <div class="col-6">
                    <div class="border rounded p-4 h-100">
                        <h3>Reading Form</h3>
                        <form>
                            <label for="type" class="form-label">Type of reading:</label>
                            <select class="form-select" id="type">
                                <option value="text">Text</option>
                                <option value="graphic">Graphic</option>
                            </select>

                            <label for="text" class="form-label">Amount of text on page:</label>
                            <select class="form-select" id="text">
                                <option value="little">Little</option>
                                <option value="medium">Medium</option>
                                <option value="lot">Lot</option>
                            </select>

                            <label for="minutes" class="form-label">Minutes:</label>
                            <input type="number" class="form-control" placeholder="Minutes">

                            <label for="pages" class="form-label">Pages:</label>
                            <input type="number" class="form-control" placeholder="Pages">
                            <br>

                            <button type="submit" class="btn btn-primary">Save</button>

                        </form>

                    </div>
                </div>
                
                <div class="col-6">
                    <div class="border rounded p-4 h-100">

                        <h3>Math Form</h3>
                        <form>
                            <label for="type_math" class="form-label">Type of reading:</label>
                            <select class="form-select" id="type_math">
                                <option value="text">Text</option>
                                <option value="graphic">Graphic</option>
                            </select>

                            <label for="text_math" class="form-label">Amount of text on page:</label>
                            <select class="form-select" id="text_math">
                                <option value="little">Little</option>
                                <option value="medium">Medium</option>
                                <option value="lot">Lot</option>
                            </select>
                            

                            <label for="minute_page" class="form-label">Amount of text on page:</label>
                            <select class="form-select" id="minute_page">
                                <option value="minutes">Minutes</option>
                                <option value="pages">Pages</option>
                            </select>
                            


                            <label for="number" class="form-label">Number:</label>
                            <input type="number" class="form-control" placeholder="Number">
                            <br>

                            <button type="submit" class="btn btn-primary">Save</button>

                        </form>

                    </div>
                </div>
            </div>

        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
